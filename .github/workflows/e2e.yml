name: E2E (Playwright)

# Browser acceptance check: boots the real API + Vite SPA and drives the
# Generate flow in headless Chromium (ADR-0008). See tests/e2e/.

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    # Browser acceptance check — exercises the real Generate flow end to end.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync Python workspace
        run: uv sync --frozen

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Install e2e (Playwright) dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (headless)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
