# Dependabot config: weekly update checks across the three ecosystems used
# in this repo. Minor + patch bumps are grouped per ecosystem into a single
# PR to keep noise down; major bumps still open individually.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # TypeScript 6.1+ / 7.x are not yet supported by the toolchain:
      # typescript-eslint hard-caps at `typescript <6.1.0`, and TS 7.0 is the
      # native-compiler rewrite. Stay on the 6.0.x line (patches still tracked).
      - dependency-name: "typescript"
        versions: [">=6.1.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
