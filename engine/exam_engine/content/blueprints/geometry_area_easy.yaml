    template:
      type: string
      enum: ["rectangle", "square", "triangle"]
    givens:
      type: object
      additionalProperties:
        type: integer
    lengths:                            # labelled-length contract map (see check docstring)
      type: object
      additionalProperties:
        type: number
    radii:
      type: object
      additionalProperties:
        type: number
story_templates:
  - stem: null
    text: "{question_text}"
solution_template:
  steps:
    - text: "{step1}"
    - text: "{step2}"
marking_scheme:
  - { mark: 1, type: M, description: "Apply the correct area formula (rectangle / square / triangle)." }
  - { mark: 1, type: A, description: "Correct area in cm²." }
answer:
  type: integer
  unit: "cm^2"
diagram: geometry_figure
